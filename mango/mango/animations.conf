# vim: set ft=dosini :
# Animation Configuration (MD3-aligned motion parameters)
# Material Design 3 easing curves and timing
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1

# MD3 zoom parameters - subtler scale for sophisticated feel
zoom_initial_ratio=0.3
zoom_end_ratio=0.8"
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.5

# MD3 timing - balanced between responsiveness and smoothness
animation_duration_move=250
animation_duration_open=300
animation_duration_tag=250
animation_duration_close=200
animation_duration_focus=0

# MD3 Easing curves:
# Standard (0.2, 0, 0, 1) - general purpose, smooth deceleration
# Emphasized (0.3, 0, 0.8, 0.15) - entrance emphasis
# Decelerated (0, 0, 0.2, 1) - quick start, slow finish
# Accelerated (0.4, 0, 1, 1) - slow start, quick finish

# Open: Emphasized easing for entrance - draws attention
animation_curve_open=0.2,0,0,1
# Move: Standard easing for repositioning - natural motion
animation_curve_move=0.2,0,0,1
# Tag: Standard easing for workspace transitions
animation_curve_tag=0.2,0,0,1
# Close: Accelerated easing for exit - quickly out of focus
animation_curve_close=0.4,0,1,1
# Focus: Standard easing for focus changes
animation_curve_focus=0.2,0,0,1
# Fade out: Decelerated for smooth disappearance
animation_curve_opafadeout=0,0,0.2,1
# Fade in: Emphasized for smooth entrance
animation_curve_opafadein=0.2,0,0,1
