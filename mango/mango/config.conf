# More option see https://github.com/DreamMaoMao/mango/wiki/

exec-once=dbus-update-activation-environment --systemd --all
exec-once=systemctl --user start mango-session.target

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 5
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15

no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.9

# Animation Configuration (MD3-aligned motion parameters)
# Material Design 3 easing curves and timing
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1

# MD3 zoom parameters - subtler scale for sophisticated feel
zoom_initial_ratio=0.3
zoom_end_ratio=0.8"
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.5

# MD3 timing - balanced between responsiveness and smoothness
animation_duration_move=250
animation_duration_open=300
animation_duration_tag=250
animation_duration_close=200
animation_duration_focus=0

# MD3 Easing curves:
# Standard (0.2, 0, 0, 1) - general purpose, smooth deceleration
# Emphasized (0.3, 0, 0.8, 0.15) - entrance emphasis
# Decelerated (0, 0, 0.2, 1) - quick start, slow finish
# Accelerated (0.4, 0, 1, 1) - slow start, quick finish

# Open: Emphasized easing for entrance - draws attention
animation_curve_open=0.2,0,0,1
# Move: Standard easing for repositioning - natural motion
animation_curve_move=0.2,0,0,1
# Tag: Standard easing for workspace transitions
animation_curve_tag=0.2,0,0,1
# Close: Accelerated easing for exit - quickly out of focus
animation_curve_close=0.4,0,1,1
# Focus: Standard easing for focus changes
animation_curve_focus=0.2,0,0,1
# Fade out: Decelerated for smooth disappearance
animation_curve_opafadeout=0,0,0.2,1
# Fade in: Emphasized for smooth entrance
animation_curve_opafadein=0.2,0,0,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=1
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
rootcolor=0x201b14ff
maximizescreencolor=0x89aa61ff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile


# layer rule
layerrule=noblur:1,layer_name:^dms
layerrule=noanim:1,layer_name:^dms

source=./dms/colors.conf
source=./dms/outputs.conf
source=./dms/binds.conf
source=./dms/cursor.conf
source=./dms/layout.conf
source=./dms/windowrules.conf

