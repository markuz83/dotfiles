[config]
# where matugen should output files
template_dir = "~/.config/matugen/templates"

[templates.helix]
input_path = "~/.config/matugen/templates/helix.toml"
output_path = "~/.config/helix/themes/matugen.toml"

[templates.yazi]
input_path = "/usr/share/quickshell/dms/matugen/templates/yazi-theme.toml"
output_path = "~/.config/yazi/flavors/matugen.yazi/flavor.toml"

[templates.wava]
input_path = "~/.config/matugen/templates/wava.ini"
output_path = "~/.config/wava/config"

[templates.rmpc]
input_path = "~/.config/matugen/templates/rmpc.ron"
output_path = "~/.config/rmpc/themes/matugen.ron"

[templates.tmux]
input_path = "~/.config/matugen/templates/tmux-colors.conf"
output_path = "~/.tmux.conf"

[templates.Matugen]
input_path = "~/.config/matugen/templates/Matugen.colors"
output_path = "~/.config/matugen/templates/example/Matugen.colors"

#[templates.kvantum_kvconfig]
#input_path = './templates/kvantum-colors.kvconfig'
#output_path = '~/.config/Kvantum/matugen/matugen.kvconfig'

#[templates.kvantum_svg]
#input_path = './templates/kvantum-colors.svg'
#output_path = '~/.config/Kvantum/matugen/matugen.svg'

#[templates.kitty]
#input_path = "~/.config/matugen/templates/base-theme.conf"
#output_path = "~/.config/kitty/base-theme.conf"

# neovim and kitty are handled by DMS system templates with dank16 injection;
# do not duplicate them here or plain `matugen` runs will fail on {{dank16.*}} vars.
