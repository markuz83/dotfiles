# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#83d5c6"
"type" = "#b1ccc6"
"type.enum.variant" = "#b1ccc6"
"constructor" = "#9ff2e2"

"constant" = "#accae5"
"constant.character" = "#accae5"
"constant.character.escape" = "#2c4a60"

"string" = "#83d5c6"
"string.regexp" = "#2c4a60"
"string.special" = "#9ff2e2"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#bec9c5", modifiers = ["italic"] }

"variable" = "#dde4e1"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#83d5c6"

"label" = "#9ff2e2"

"punctuation" = "#bec9c5"
"punctuation.special" = "#b1ccc6"

"keyword" = "#83d5c6"
"keyword.control.conditional" = { fg = "#83d5c6", modifiers = ["italic"] }

"operator" = "#b1ccc6"

"function" = "#83d5c6"
"function.macro" = "#005047"

"tag" = "#83d5c6"
"namespace" = { fg = "#b1ccc6", modifiers = ["italic"] }

"special" = "#83d5c6"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#83d5c6"
"markup.heading.3" = "#b1ccc6"
"markup.heading.4" = "#accae5"
"markup.heading.5" = "#9ff2e2"
"markup.heading.6" = "#005047"

"markup.list" = "#b1ccc6"
"markup.list.unchecked" = "#bec9c5"
"markup.list.checked" = "#9ff2e2"

"markup.bold" = { fg = "#83d5c6", modifiers = ["bold"] }
"markup.italic" = { fg = "#b1ccc6", modifiers = ["italic"] }

"markup.link.url" = { fg = "#83d5c6", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#9ff2e2"
"markup.link.label" = "#accae5"
"markup.raw" = "#cbe6ff"
"markup.quote" = "#2c4a60"

# --- Diff ---

"diff.plus" = "#accae5"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#83d5c6"

# --- UI Elements ---

"ui.background" = { fg = "#dde4e1", bg = "none" }

"ui.linenr" = { fg = "#bec9c5" }
"ui.linenr.selected" = { fg = "#9ff2e2" }

"ui.statusline" = { fg = "#9ff2e2", bg = "none" }
"ui.statusline.inactive" = { fg = "#bec9c5", bg = "none" }
"ui.statusline.normal" = { fg = "#0e1513", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#0e1513", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#0e1513", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#dde4e1", bg = "none" }
"ui.window" = { fg = "#bec9c5" }
"ui.help" = { fg = "#bec9c5", bg = "none" }

"ui.bufferline" = { fg = "#bec9c5", bg = "none" }
"ui.bufferline.active" = { fg = "#003730", bg = "#83d5c6", underline = { color = "#83d5c6", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#dde4e1"
"ui.text.focus" = { fg = "#83d5c6", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#bec9c5" }
"ui.text.directory" = { fg = "#83d5c6" }

"ui.virtual" = "#bec9c5"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#171d1b"
"ui.virtual.inlay-hint" = { fg = "#bec9c5", bg = "none" }
"ui.virtual.jump-label" = { fg = "#005047", modifiers = ["bold"] }

"ui.selection" = { bg = "#3f4946" }

"ui.cursor" = { fg = "#0e1513", bg = "#9ff2e2" }
"ui.cursor.primary" = { fg = "#0e1513", bg = "#9ff2e2" }
"ui.cursor.match" = { fg = "#9ff2e2", modifiers = ["bold"] }

"ui.highlight" = { bg = "#334b47", modifiers = ["bold"] }

"ui.menu" = { fg = "#dde4e1", bg = "none" }
"ui.menu.selected" = { fg = "#83d5c6", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#b1ccc6", underline = { color = "#b1ccc6", style = "curl" } }
"diagnostic.info" = { fg = "#accae5", underline = { color = "#accae5", style = "curl" } }
"diagnostic.hint" = { fg = "#2c4a60", underline = { color = "#2c4a60", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#accae5"
info = "#83d5c6"
hint = "#b1ccc6"
